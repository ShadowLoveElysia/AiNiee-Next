name: tauri-release-macos

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: tauri-release-macos-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release-macos-aarch64:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Tools/TauriShell/package-lock.json

      - name: Install Rust stable with macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish macOS (arm64) official release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Tools/TauriShell
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: "AiNiee GUI ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          releaseBody: "Official macOS arm64 release build generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

  build-release-macos-x64:
    runs-on: macos-latest
    needs: build-release-macos-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Tools/TauriShell/package-lock.json

      - name: Install Rust stable with macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish macOS (x64) official release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Tools/TauriShell
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: "AiNiee GUI ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          releaseBody: "Official macOS x64 release build generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin

name: tauri-release-linux

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: tauri-release-linux-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            Tools/WebServer/package-lock.json
            Tools/TauriShell/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Build Web assets
        working-directory: Tools/WebServer
        run: |
          npm ci
          npm run build

      - name: Install Tauri shell dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish Linux official release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Tools/TauriShell
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: "AiNiee GUI ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          releaseBody: "Official Linux release build generated by GitHub Actions."
          releaseDraft: false
          prerelease: false

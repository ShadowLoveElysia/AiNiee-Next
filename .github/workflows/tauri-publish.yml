name: publish-tauri

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

concurrency:
  group: tauri-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Tools/TauriShell/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Tools/TauriShell
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: "AiNiee GUI ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          releaseBody: "Official release build generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

name: tauri-release-windows

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: tauri-release-windows-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: Tools/TauriShell/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish Windows official release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Tools/TauriShell
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: "AiNiee GUI ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          releaseBody: "Official Windows release build generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
